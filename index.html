<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roçagem e Poda - Orçamento Rápido</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <!-- Cabeçalho Principal -->
        <div class="header-box">
            <h2>Roçagem e Poda</h2>
            <p>Orçamento rápido e automático</p>
        </div>

        <!-- Bloco: Dados do Cliente -->
        <div class="card">
            <div class="title">Dados do cliente</div>
            <input type="text" id="nome" placeholder="Nome">
            <input type="text" id="telefone" placeholder="Telefone">
            <input type="text" id="endereco" placeholder="Endereço">
        </div>

        <!-- Bloco: Detalhes do Serviço -->
        <div class="card">
            <div class="title">Detalhes do serviço</div>
            
            <label>Tamanho do Terreno:</label>
            <select id="tamanhoTerreno" onchange="atualizarPrecoAoMudar()">
                <option value="Pequeno (Até 100m²)">Pequeno (Até 100m²)</option>
                <option value="Médio (Até 300m²)">Médio (Até 300m²)</option>
                <option value="Grande (Acima de 300m²)">Grande (Acima de 300m²)</option>
            </select>

            <label>Estado da Vegetação:</label>
            <select id="estadoMato" onchange="atualizarPrecoAoMudar()">
                <option value="Mato Baixo">Mato Baixo</option>
                <option value="Mato Alto">Mato Alto</option>
            </select>

            <label>Necessita de Poda de Árvore?</label>
            <select id="podaArvore" onchange="atualizarPrecoAoMudar()">
                <option value="Não precisa de poda">Não precisa de poda</option>
                <option value="Árvore Pequena">Árvore Pequena</option>
                <option value="Árvore Grande">Árvore Grande</option>
            </select>

            <textarea id="descricao" placeholder="Descreva detalhes adicionais sobre o local..."></textarea>
        </div>

        <!-- Bloco: Resumo do Orçamento -->
        <div class="card">
            <div class="title">Resumo do orçamento</div>
            <p id="valorPreview">Valor Estimado: R$ 100</p>
        </div>

        <!-- Botões de Envio -->
        <button class="btn-pulsando" onclick="processarEEnviar()">🚀 QUERO ORÇAMENTO AGORA</button>
        <button class="btn-whatsapp" onclick="processarEEnviar()">Solicitar orçamento no WhatsApp</button>

    </div>

    <script src="script.js"></script>
</body>
</html>
