<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roçagem e Poda - Orçamento Rápido</title>
    <style>
        :root {
            --primary: #2E7D32;
            --secondary: #1B5E20;
            --background: #F4F6F4;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin: 25px 0 12px 0;
            color: var(--secondary);
            border-bottom: 1px solid #E0E0E0;
            padding-bottom: 5px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
            color: #444;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-card {
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fff;
        }

        .option-card img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .option-card p {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
        }

        .option-card input[type="radio"] {
            display: none;
        }

        .option-card:has(input[type="radio"]:checked) {
            border-color: var(--primary);
            background-color: #E8F5E9;
            transform: scale(1.03);
        }

        .file-upload-box {
            border: 2px dashed #2E7D32;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            background: #F9FBF9;
            cursor: pointer;
            position: relative;
        }

        .file-upload-box input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .preview-img {
            max-width: 100%;
            height: 150px;
            object-fit: contain;
            margin-top: 10px;
            display: none;
            border-radius: 8px;
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 30px;
            transition: background 0.3s;
            border: none;
            width: 100%;
            cursor: pointer;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover {
            background-color: #128C7E;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Roçagem e Poda</h2>
    <p class="subtitle">Preencha os dados e selecione as características para gerar o orçamento.</p>

    <form id="orcamentoForm" onsubmit="return false;">
        
        <div class="section-title">Seus Dados</div>
        
        <div class="input-group">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>
        </div>

        <div class="input-group">
            <label for="telefone">Telefone / WhatsApp:</label>
            <input type="tel" id="telefone" placeholder="(XX) XXXXX-XXXX" required>
        </div>

        <div class="input-group">
            <label for="endereco">Endereço do Terreno:</label>
            <input type="text" id="endereco" placeholder="Rua, número, bairro e cidade" required>
        </div>

        <div class="section-title">Tamanho do Terreno</div>
        <div class="options-grid">
            <label class="option-card">
                <input type="radio" name="tamanho" value="Pequeno (Até 100m²)" checked>
                <img src="https://pixabay.com" alt="Terreno Pequeno">
                <p>Pequeno<br><span style="font-size:11px; color:#777;">Até 100m²</span></p>
            </label>
            <label class="option-card">
                <input type="radio" name="tamanho" value="Médio (Até 300m²)">
                <img src="https://pixabay.com" alt="Terreno Médio">
                <p>Médio<br><span style="font-size:11px; color:#777;">Até 300m²</span></p>
            </label>
            <label class="option-card">
                <input type="radio" name="tamanho" value="Grande (Acima de 300m²)">
                <img src="https://pixabay.com" alt="Terreno Grande">
                <p>Grande<br><span style="font-size:11px; color:#777;">Acima de 300m²</span></p>
            </label>
        </div>

        <div class="section-title">Estado da Vegetação</div>
        <div class="options-grid">
            <label class="option-card">
                <input type="radio" name="vegetacao" value="Mato Baixo" checked>
                <img src="https://pixabay.com" alt="Mato Baixo">
                <p>Mato Baixo</p>
            </label>
            <label class="option-card">
                <input type="radio" name="vegetacao" value="Mato Alto">
                <img src="https://pixabay.com" alt="Mato Alto">
                <p>Mato Alto</p>
            </label>
        </div>

        <div class="section-title">Necessita de Poda de Árvore?</div>
        <div class="options-grid">
            <label class="option-card">
                <input type="radio" name="poda" value="Não precisa de poda" checked>
                <img src="https://pixabay.com" alt="Sem Poda">
                <p>Não Precisa</p>
            </label>
            <label class="option-card">
                <input type="radio" name="poda" value="Árvore Pequena">
                <img src="https://pixabay.com" alt="Árvore Pequena">
                <p>Árvore Pequena</p>
            </label>
            <label class="option-card">
                <input type="radio" name="poda" value="Árvore Grande">
                <img src="https://pixabay.com" alt="Árvore Grande">
                <p>Árvore Grande</p>
            </label>
        </div>

        <div class="section-title">Foto do Local (Opcional)</div>
        <div class="file-upload-box">
            <span style="color: var(--primary); font-weight: bold;">📁 Clique aqui para carregar a foto</span>
            <input type="file" id="fotoLocal" accept="image/*" onchange="previewImage(event)">
            <img id="imageDisplay" class="preview-img" alt="Pré-visualização">
        </div>

        <!-- BOTÃO FINAL: Link definitivo direto que força a abertura do aplicativo do WhatsApp -->
        <a id="btnWhatsApp" class="btn-whatsapp" href="#" onclick="dispararWhatsApp(event)">
            🚀 QUERO ORÇAMENTO AGORA NO WHATSAPP
        </a>
    </form>
</div>

<script>
// Exibe a imagem anexada como pré-visualização no formulário do site
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function(){
        const output = document.getElementById('imageDisplay');
        output.src = reader.result;
        output.style.display = 'block';
    }
    reader.readAsDataURL(event.target.files);
}

// Junta as informações e força o direcionamento nativo para o chat comercial
function dispararWhatsApp(event) {
    const nome = document.getElementById('nome').value.trim();
    const telefoneCliente = document.getElementById('telefone').value.trim();
    const endereco = document.getElementById('endereco').value.trim();

    // Trava e exige o preenchimento caso algum dado essencial falte
    if(!nome || !telefoneCliente || !endereco) {
        event.preventDefault(); 
        alert("Por favor, preencha o Nome, Telefone e Endereço para continuar!");
        return false;
    }

    const tamanho = document.querySelector('input[name="tamanho"]:checked').value;
    const vegetacao = document.querySelector('input[name="vegetacao"]:checked').value;
